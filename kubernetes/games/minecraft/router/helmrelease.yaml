---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-router
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: mc-router
  values:
    image:
      repository: ghcr.io/itzg/mc-router
      tag: 1.44.0@sha256:74c0f682cb45a1ac7ac25082c63f236bd6b04395508ad41d5825fd8cc8828b8f
      pullPolicy: IfNotPresent
    extraArgs:
      - --in-kube-cluster
    services:
      minecraft:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: mc-create.r7n.dev, mc-thermal.r7n.dev
