---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  values:
    containerSecurityContext:
      capabilities:
        add: ["SYS_CHROOT"]
    gitea:
      admin:
        existingSecret: &secret forgejo-secret
      config:
        APP_NAME: "Forgejo"
        database:
          DB_TYPE: postgres
          HOST: postgres.storage.svc.cluster.local:5432
          NAME: forgejo
        server:
          DOMAIN: forgejo.r7n.dev
          SSH_PORT: 22
          SSH_LISTEN_PORT: 22
          SSH_DOMAIN: ssh.forgejo.r7n.dev
          ROOT_URL: https://forgejo.r7n.dev
          LANDING_PAGE: explore
        repository:
          DEFAULT_BRANCH: main
          DEFAULT_PRIVATE: true
        admin:
          DISABLE_REGULAR_ORG_CREATION: true
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          DISABLE_REGISTRATION: false
          ENABLE_PASSKEY_AUTHENTICATION: false
          SHOW_REGISTRATION_BUTTON: false
        cron:
          ENABLED: true
        storage: &s3storage
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: 192.168.210.251:30293
          MINIO_BUCKET: forgejo
          MINIO_LOCATION: us-east-1
          MINIO_USE_SSL: true
        attachment: *s3storage
        mailer:
          ENABLED: false
        cache:
          ADAPTER: redis
        queue:
          TYPE: redis
        session:
          PROVIDER: redis
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: true
          UPDATE_AVATAR: true
          WHITELISTED_URIS: authentik.r7n.dev
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          ACCOUNT_LINKING: auto
          USERNAME: preferred_username
          UPDATE_AVATAR: true
          OPENID_CONNECT_SCOPES: openid email profile groups
        other:
          SHOW_FOOTER_TEMPLATE_LOAD_TIME: false
        time:
          DEFAULT_UI_LOCATION: America/Los_Angeles
        ui:
          SHOW_USER_EMAIL: false
        webhook:
          ALLOWED_HOST_LIST: "*.r7n.dev"
      oauth:
        - name: Authentik
          provider: openidConnect
          existingSecret: *secret
          autoDiscoverUrl: https://authentik.r7n.dev/application/o/forgejo/.well-known/openid-configuration
          groupClaimName: groups
          adminGroup: ID-Admin
          iconUrl: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/pocket-id.png
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    postgresql:
      enabled: false
    memcached:
      enabled: false
    persistence:
      enabled: true
      mount: true
      create: true
      storageClass: nfs-retain
    service:
      ssh:
        type: LoadBalancer
        port: 22
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "ssh.forgejo.r7n.dev"
    httpRoute:
      enabled: true
      hostnames:
        - forgejo.r7n.dev
      parentRefs:
        - name: envoy-internal
          namespace: network
  valuesFrom:
    - targetPath: gitea.config.storage.MINIO_ACCESS_KEY_ID
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_AWS_ACCESS_KEY_ID
    - targetPath: gitea.config.storage.MINIO_SECRET_ACCESS_KEY
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_AWS_SECRET_ACCESS_KEY
    - targetPath: gitea.config.attachment.MINIO_ACCESS_KEY_ID
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_AWS_ACCESS_KEY_ID
    - targetPath: gitea.config.attachment.MINIO_SECRET_ACCESS_KEY
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_AWS_SECRET_ACCESS_KEY
    - targetPath: gitea.config.database.USER
      kind: Secret
      name: *secret
      valuesKey: POSTGRES_USERNAME
    - targetPath: gitea.config.database.PASSWD
      kind: Secret
      name: *secret
      valuesKey: POSTGRES_PASSWORD
    - targetPath: gitea.config.cache.HOST
      kind: Secret
      name: *secret
      valuesKey: REDIS_URL
    - targetPath: gitea.config.queue.CONN_STR
      kind: Secret
      name: *secret
      valuesKey: REDIS_URL
    - targetPath: gitea.config.session.PROVIDER_CONFIG
      kind: Secret
      name: *secret
      valuesKey: REDIS_URL
    - targetPath: gitea.config.security.SECRET_KEY
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_SECRET_KEY
    - targetPath: gitea.config.security.INTERNAL_TOKEN
      kind: Secret
      name: *secret
      valuesKey: FORGEJO_INTERNAL_TOKEN
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: forgejo
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: forgejo
              spec:
                template:
                  spec:
                    initContainers:
                      - name: init-db
                        image: ghcr.io/home-operations/postgres-init:18
                        envFrom:
                          - secretRef:
                              name: forgejo-secret
